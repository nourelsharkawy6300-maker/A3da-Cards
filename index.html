<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    
    <meta name="referrer" content="no-referrer">
    
    <title>لعبة قعدة 🎲</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= ستايل التحميل الشيك ================= */
        body { 
            margin: 0; 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%; 
            animation: gradientBG 10s ease infinite;
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            text-align: center; 
            overflow: hidden; 
            position: relative;
        }
        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        /* تأثير النقط في الخلفية */
        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 40px 40px; animation: particleMove 15s linear infinite;
        }
        @keyframes particleMove { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-40px); } 
        }

        /* البوكس الزجاجي */
        .glass-box {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 25px; 
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
            width: 85%; 
            max-width: 400px; 
            z-index: 1;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp { 
            0% { opacity: 0; transform: scale(0.8) translateY(30px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        h2 { font-size: 26px; margin-bottom: 5px; font-weight: 900; color: #f1c40f; text-shadow: 0 3px 6px rgba(0,0,0,0.6); }
        .funny-quote { color: #00ffcc; font-size: 16px; font-weight: 800; min-height: 25px; }
        
        /* كارت الـ 3D اللي بيلف */
        .card-loader {
            width: 70px; height: 100px; margin: 0 auto 25px auto;
            background: linear-gradient(135deg, #f1c40f, #e67e22); 
            border-radius: 10px; border: 3px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: flipCard3D 1.5s infinite ease-in-out;
        }
        @keyframes flipCard3D { 
            0% { transform: perspective(400px) rotateY(0deg); } 
            50% { transform: perspective(400px) rotateY(180deg); } 
            100% { transform: perspective(400px) rotateY(360deg); } 
        }
    </style>

    <script>
        // 🚨 الداتا بيز بتاعة الكروت (الـ IDs مستخرجة جاهزة ومفلترة) 🚨
        const cardDatabase = {
            "1": "1qu6YdXldg_3yfhRNpBSDcNb812jX6zsb",
            "2": "1ptdc7mw3GQ8UIbaDqTX2jMXcQ3ljp3Y0",
            "3": "1ouCtCYgfwZp0ATaHQEFnEoRVXOlO2Jom",
            "4": "1byhfZzACpWPptafa4LYGS_Fb1HyAnhGp",
            "5": "1ITTt6_ZHNhmfXG09I_zYC4ftKOXjAFH-",
            "6": "1GwNJa4lkNRzefQOWKQcBWAPwAwH7igLP",
            "7": "130XaQhjnOfIuDCKE7n2MH3FtPv4M0oWj",
            "8": "12I12qhb_Q5giIJ8e9gRXRPWt-rwC1Hue",
            "9": "1vSY7ZS04idHakI0bvjbt72dai68XSssJ",
            "10": "1_fTvnOsMapXlwwFY3aDuK7Ob6nbZdOUG",
            "11": "1U_wWI6Brz2GcVkFYHEckpvwM006CcoN0",
            "12": "1IZt07iwzOs-BC98JuzzkGbJwm54qcwab",
            "13": "16FluRYUyamXevZVDjVPhcRmtd9cq88Uf",
            "14": "1GZTKXBogY0E_zHvagW3hDUmT67syCdqg",
            "15": "1yLvyisdqn7J2ljMxG9dT5OKhXXsTXu7j",
            "16": "1E6dzcfODGUn2-0tPZD7T9OMroeXUl4ez",
            "17": "13EazBzOqqnjFpOW6ql-ByGniFhKD7POY",
            "18": "حط_ID_الكارت_الاخير_هنا" // <-- متنساش تحط الـ ID بتاع الكارت ده بين علامتين التنصيص
        };

        const funnyQuotes = [
            "يا ترى هتطلع أم خالد ولا إياد الموجي؟ 👀",
            "استرها علينا يارب من كارت الدبيس... 💸",
            "جهز نفسك لتقليد الدكتور! 👨‍🏫",
            "يا ساتر.. شكلها فيها كارت قفلنا المايك 🤐",
            "اسحب كارتك وواجه مصيرك يا معلم! ⚡"
        ];

        window.onload = function() {
            // عرض جملة عشوائية للاعب
            document.getElementById('random-quote').innerText = funnyQuotes[Math.floor(Math.random() * funnyQuotes.length)];
            
            // قراءة رقم الكارت من اللينك
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            // لو الكارت موجود في الداتا بيز
            if (cardId && cardDatabase[cardId]) {
                const driveId = cardDatabase[cardId];
                
                // لينك عرض الصورة الخام بأعلى جودة من غير واجهة جوجل درايف
                const directImgUrl = `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`;
                
                // بعد ثانيتين بالظبط، هيحول المتصفح للصورة مباشرة بدون أي ضغطة
                setTimeout(() => {
                    window.location.replace(directImgUrl);
                }, 2000);

            } else {
                // رسالة خطأ لو الباركود بايظ
                document.getElementById('content-box').innerHTML = `
                    <div style="font-size: 60px; margin-bottom: 15px; animation: popUp 0.5s;">⚠️</div>
                    <h2>الكارت ده مش موجود!</h2>
                    <p style="color: #e0e0e0; font-size: 15px;">شكلك ضربت باركود غلط يا معلم.</p>
                `;
            }
        }
    </script>
</head>
<body>
    <div class="particles"></div>
    <div class="glass-box" id="content-box">
        <div class="card-loader"></div>
        <h2>🚀 ثواني وكارتك يفتح...</h2>
        <div id="random-quote" class="funny-quote">جاري سحب الكارت...</div>
    </div>
</body>
</html>
