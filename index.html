<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    
    <meta property="og:title" content="لعبة قعدة 🎲">
    <meta property="og:description" content="اسحب كارتك وشوف حظك يا معلم!">
    
    <title>لعبة قعدة - جاري سحب الكارت...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNZPERH684"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RNZPERH684');
    </script>

    <style>
        /* 🌟 أنيميشن الخلفية والبارتيكلز */
        body { 
            margin: 0;
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center; 
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🌟 تأثير النقط الطايرة في الخلفية */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 40px 40px;
            animation: particleMove 15s linear infinite;
        }
        @keyframes particleMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(-40px); }
        }

        /* 🌟 بوكس الإزاز مع أنيميشن دخول */
        .glass-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 400px;
            z-index: 1;
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 { font-size: 26px; margin-bottom: 5px; font-weight: 900; color: #f1c40f; text-shadow: 0 3px 6px rgba(0,0,0,0.6); }
        
        /* 🌟 الجملة العشوائية اللي بتطلع */
        .funny-quote { 
            color: #00ffcc; 
            font-size: 16px; 
            margin-bottom: 25px; 
            font-weight: 800; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
            min-height: 25px;
        }
        
        p { color: #e0e0e0; font-size: 15px; margin-bottom: 20px; font-weight: 600; }
        
        /* 🌟 أنيميشن الكارت 3D الطاير */
        .card-loader-container {
            perspective: 800px;
            margin: 0 auto 25px auto;
            width: 70px;
            height: 100px;
        }
        .card-loader {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            border-radius: 10px;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.5);
            animation: flipCard3D 1.5s infinite ease-in-out;
            transform-style: preserve-3d;
        }
        @keyframes flipCard3D {
            0% { transform: rotateY(0deg) translateY(0); }
            50% { transform: rotateY(180deg) translateY(-15px); box-shadow: 0 20px 30px rgba(241, 196, 15, 0.3); }
            100% { transform: rotateY(360deg) translateY(0); }
        }
        
        /* 🌟 زرار الطوارئ بريميم */
        .fallback-btn {
            display: none; 
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 800;
            font-size: 16px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .fallback-btn:hover { border: 2px solid #fff; box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6); }
        .fallback-btn:active { transform: scale(0.95); }

        /* 🌟 شاشة الخطأ اللي بتترج */
        .error-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
        }
    </style>

    <script>
        // 🚨 لينكات كروت جوجل درايف (18 كارت) 🚨
        const cardLinks = {
            "1": "https://drive.google.com/file/d/1qu6YdXldg_3yfhRNpBSDcNb812jX6zsb/view?usp=drive_link",
            "2": "https://drive.google.com/file/d/1ptdc7mw3GQ8UIbaDqTX2jMXcQ3ljp3Y0/view?usp=drive_link",
            "3": "https://drive.google.com/file/d/1ouCtCYgfwZp0ATaHQEFnEoRVXOlO2Jom/view?usp=drive_link",
            "4": "https://drive.google.com/file/d/1byhfZzACpWPptafa4LYGS_Fb1HyAnhGp/view?usp=drive_link",
            "5": "https://drive.google.com/file/d/1ITTt6_ZHNhmfXG09I_zYC4ftKOXjAFH-/view?usp=drive_link",
            "6": "https://drive.google.com/file/d/1GwNJa4lkNRzefQOWKQcBWAPwAwH7igLP/view?usp=drive_link",
            "7": "https://drive.google.com/file/d/130XaQhjnOfIuDCKE7n2MH3FtPv4M0oWj/view?usp=drive_link",
            "8": "https://drive.google.com/file/d/12I12qhb_Q5giIJ8e9gRXRPWt-rwC1Hue/view?usp=drive_link",
            "9": "https://drive.google.com/file/d/1vSY7ZS04idHakI0bvjbt72dai68XSssJ/view?usp=drive_link",
            "10": "https://drive.google.com/file/d/1_fTvnOsMapXlwwFY3aDuK7Ob6nbZdOUG/view?usp=drive_link",
            "11": "https://drive.google.com/file/d/1U_wWI6Brz2GcVkFYHEckpvwM006CcoN0/view?usp=sharing",
            "12": "https://drive.google.com/file/d/1IZt07iwzOs-BC98JuzzkGbJwm54qcwab/view?usp=drive_link",
            "13": "https://drive.google.com/file/d/16FluRYUyamXevZVDjVPhcRmtd9cq88Uf/view?usp=drive_link",
            "14": "https://drive.google.com/file/d/1GZTKXBogY0E_zHvagW3hDUmT67syCdqg/view?usp=drive_link",
            "15": "https://drive.google.com/file/d/1yLvyisdqn7J2ljMxG9dT5OKhXXsTXu7j/view?usp=drive_link",
            "16": "https://drive.google.com/file/d/1E6dzcfODGUn2-0tPZD7T9OMroeXUl4ez/view?usp=drive_link",
            "17": "https://drive.google.com/file/d/13EazBzOqqnjFpOW6ql-ByGniFhKD7POY/view?usp=drive_link",
            "18": "حط_لينك_الكارت_رقم_18_هنا"
        };

        // 🌟 لستة الجمل الكوميدية العشوائية
        const funnyQuotes = [
            "جهز نفسك للفضايح يا معلم! 😈",
            "استرها علينا يارب... 🤲",
            "يا ترى الكارت ده أكشن ولا فخ؟ 🃏",
            "اللي بيخاف يروح! 🚀",
            "النقطة السلبية بتوجع، ركز! 📉",
            "القعدة دي مش هتعدي على خير... 🔥",
            "اسحب كارتك وواجه مصيرك! ⚡"
        ];

        window.onload = function() {
            // اختيار جملة عشوائية
            const randomQuote = funnyQuotes[Math.floor(Math.random() * funnyQuotes.length)];
            const quoteElement = document.getElementById('random-quote');
            if (quoteElement) quoteElement.innerText = randomQuote;

            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId && cardLinks[cardId]) {
                // 🌟 تأخير مقصود (1.5 ثانية) عشان يعيشوا في المود ويشوفوا الأنيميشن
                setTimeout(() => {
                    window.location.replace(cardLinks[cardId]);
                }, 1500);
                
                // زرار الطوارئ يظهر بعد 4 ثواني لو النت تقيل
                setTimeout(() => {
                    const btn = document.getElementById('fallback');
                    if(btn) {
                        btn.style.display = 'inline-block';
                        btn.href = cardLinks[cardId];
                    }
                }, 4000);

            } else {
                // رسالة الخطأ المتطورة
                document.getElementById('content-box').innerHTML = `
                    <div class="error-icon">⚠️</div>
                    <h2>الكارت ده مش موجود!</h2>
                    <p>شكلك ضربت باركود غلط أو الكارت لسه متطبعش يا معلم.</p>
                `;
            }
        }
    </script>
</head>
<body>
    <div class="particles"></div>
    <div class="glass-box" id="content-box">
        <div class="card-loader-container">
            <div class="card-loader"></div>
        </div>
        <h2>🚀 ثواني وكارتك يفتح...</h2>
        <div id="random-quote" class="funny-quote">جاري سحب الكارت...</div>
        <p>خليك جاهز!</p>
        <a id="fallback" class="fallback-btn" href="#">اضغط هنا لو الكارت مفتحش لوحده</a>
    </div>
</body>
</html>
