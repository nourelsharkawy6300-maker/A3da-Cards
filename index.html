<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- لون المتصفح فوق عشان يطقم مع لون اللعبة الأزرق -->
    <meta name="theme-color" content="#4a4d9e">
    
    <!-- 🚨 طاقية الإخفاء لمنع إيرور جوجل درايف 🚨 -->
    <meta name="referrer" content="no-referrer">
    
    <title>لعبة قعدة 🎲</title>
    
    <!-- استدعاء خط Tajawal بكل الأوزان المطلوبة (500, 700, 800, 900) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= الهوية البصرية (Colors, Typography & Vibe) ================= */
        body { 
            margin: 0; 
            font-family: 'Tajawal', sans-serif; /* الخط الأساسي لكل حاجة */
            background-color: #4a4d9e; /* لون البراند الأساسي */
            
            /* 🚨 الصورة العشوائية اللي بتدي الفايب الشبابي (Chaotic Gen-Z) 🚨 */
            background-image: url('image_23f560.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: #f0f0f0; /* اللون الفاتح الأساسي للنصوص */
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            text-align: center; 
            overflow: hidden; 
            position: relative;
            letter-spacing: normal; /* ممنوع الـ letter-spacing في العربي */
        }

        /* إضافة طبقة تعتيم خفيفة جداً فوق الخلفية عشان الكلام يقرأ بوضوح */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 77, 158, 0.4);
            z-index: 0;
        }

        /* البوكس الزجاجي */
        .glass-box {
            background: rgba(240, 240, 240, 0.08); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(240, 240, 240, 0.15); 
            border-radius: 30px; 
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); 
            width: 85%; 
            max-width: 400px; 
            z-index: 1;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp { 
            0% { opacity: 0; transform: scale(0.8) translateY(30px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* 1- العناوين الكبيرة (ExtraBold / Black - Weight: 900) */
        h2 { 
            font-size: 32px; 
            margin-bottom: 8px; 
            font-weight: 900; 
            color: #f0f0f0; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            line-height: 1.2;
        }

        /* 3- نصوص الكروت والمواقف (Bold - Weight: 700) */
        .funny-quote { 
            color: #f0f0f0; 
            font-size: 18px; 
            font-weight: 700; 
            line-height: 1.6; /* Line-height واسع ومريح */
            min-height: 30px; 
            opacity: 0.95;
        }
        
        /* 4- النصوص الصغيرة (Medium - Weight: 500) */
        .small-text {
            font-weight: 500;
            font-size: 14px;
            color: rgba(240, 240, 240, 0.7); /* لون أهدأ */
            margin-top: 20px;
        }

        /* لوجو اللعبة (حسب الملاحظات) */
        .game-logo {
            max-width: 120px;
            margin-bottom: 15px;
            display: none; /* تقدر تشيل سطر الإخفاء ده لو رفعت صورة logo.png وعايزها تظهر */
        }

        /* كارت الـ 3D اللي بيلف (معدل عشان يناسب الألوان الجديدة) */
        .card-loader {
            width: 75px; height: 110px; margin: 0 auto 20px auto;
            background: #f0f0f0; 
            border-radius: 12px; 
            border: 4px solid rgba(240,240,240,0.9); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            position: relative;
            animation: flipCard3D 1.5s infinite ease-in-out;
            display: flex; justify-content: center; align-items: center;
        }
        /* ظهر الكارت من جوه */
        .card-loader::after {
            content: '🎲';
            font-size: 35px;
            color: #4a4d9e;
        }
        @keyframes flipCard3D { 
            0% { transform: perspective(400px) rotateY(0deg); } 
            50% { transform: perspective(400px) rotateY(180deg); } 
            100% { transform: perspective(400px) rotateY(360deg); } 
        }
    </style>

    <script>
        // 🚨 الداتا بيز بتاعة الـ 18 كارت 🚨
        const cardDatabase = {
            "1": "1qu6YdXldg_3yfhRNpBSDcNb812jX6zsb",
            "2": "1ptdc7mw3GQ8UIbaDqTX2jMXcQ3ljp3Y0",
            "3": "1ouCtCYgfwZp0ATaHQEFnEoRVXOlO2Jom",
            "4": "1byhfZzACpWPptafa4LYGS_Fb1HyAnhGp",
            "5": "1ITTt6_ZHNhmfXG09I_zYC4ftKOXjAFH-",
            "6": "1GwNJa4lkNRzefQOWKQcBWAPwAwH7igLP",
            "7": "130XaQhjnOfIuDCKE7n2MH3FtPv4M0oWj",
            "8": "12I12qhb_Q5giIJ8e9gRXRPWt-rwC1Hue",
            "9": "1vSY7ZS04idHakI0bvjbt72dai68XSssJ",
            "10": "1_fTvnOsMapXlwwFY3aDuK7Ob6nbZdOUG",
            "11": "1U_wWI6Brz2GcVkFYHEckpvwM006CcoN0",
            "12": "1IZt07iwzOs-BC98JuzzkGbJwm54qcwab",
            "13": "16FluRYUyamXevZVDjVPhcRmtd9cq88Uf",
            "14": "1GZTKXBogY0E_zHvagW3hDUmT67syCdqg",
            "15": "1yLvyisdqn7J2ljMxG9dT5OKhXXsTXu7j",
            "16": "1E6dzcfODGUn2-0tPZD7T9OMroeXUl4ez",
            "17": "13EazBzOqqnjFpOW6ql-ByGniFhKD7POY",
            "18": "1b7sv8YQZqPHYx9n7JCjzySxi50DJDn0B" 
        };

        const funnyQuotes = [
            "يا ترى هتطلع أم خالد ولا إياد الموجي؟ 👀",
            "استرها علينا يارب من كارت الدبيس... 💸",
            "جهز نفسك لتقليد الدكتور! 👨‍🏫",
            "يا ساتر.. شكلها فيها كارت قفلنا المايك 🤐",
            "اسحب كارتك وواجه مصيرك يا معلم! ⚡"
        ];

        window.onload = function() {
            document.getElementById('random-quote').innerText = funnyQuotes[Math.floor(Math.random() * funnyQuotes.length)];
            
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId && cardDatabase[cardId]) {
                const driveId = cardDatabase[cardId];
                
                const directImgUrl = `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`;
                
                setTimeout(() => {
                    window.location.replace(directImgUrl);
                }, 2000);

            } else {
                document.getElementById('content-box').innerHTML = `
                    <div style="font-size: 60px; margin-bottom: 15px; animation: popUp 0.5s;">⚠️</div>
                    <h2>الكارت ده مش موجود!</h2>
                    <p class="funny-quote" style="font-size: 16px;">شكلك ضربت باركود غلط يا معلم.</p>
                `;
            }
        }
    </script>
</head>
<body>
    <div class="glass-box" id="content-box">
        <!-- لو عندك لوجو اسمه logo.png وحبيت تحطه في المستقبل -->
        <img src="logo.png" alt="قعدة سكرول" class="game-logo" onerror="this.style.display='none'">
        
        <div class="card-loader"></div>
        <h2>ثواني وكارتك يفتح...</h2>
        <div id="random-quote" class="funny-quote">جاري سحب الكارت...</div>
        <div class="small-text">قعدة سكرول 🎮</div>
    </div>
</body>
</html>
