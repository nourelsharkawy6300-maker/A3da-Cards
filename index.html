<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a4d9e">
    
    <meta name="referrer" content="no-referrer">
    
    <title>لعبة قعدة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            font-family: 'Tajawal', sans-serif; 
            background-color: #4a4d9e; 
            
            /* خلفية الشخبطة */
            background-image: url('image_23f560.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: #f0f0f0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            text-align: center; 
            overflow: hidden; 
            position: relative;
            letter-spacing: normal; 
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 77, 158, 0.45);
            z-index: 0;
        }

        .glass-box {
            background: rgba(240, 240, 240, 0.08); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(240, 240, 240, 0.15); 
            border-radius: 24px; 
            padding: 45px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            width: 85%; 
            max-width: 380px; 
            z-index: 1;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp { 
            0% { opacity: 0; transform: scale(0.9) translateY(20px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        h2 { 
            font-size: 28px; 
            margin: 0 0 10px 0; 
            font-weight: 900; 
            color: #f0f0f0; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }

        .small-text {
            font-weight: 500;
            font-size: 15px;
            color: rgba(240, 240, 240, 0.6); 
        }

        /* ====== الكارت وهالة الطاقة ====== */
        .card-wrapper {
            position: relative;
            width: 75px; 
            height: 110px; 
            margin: 0 auto 35px auto;
        }

        /* الإضاءة اللي بتنور ورا الكارت */
        .card-wrapper::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            background: #f0f0f0;
            border-radius: 12px;
            filter: blur(18px);
            opacity: 0.5;
            animation: pulseGlow 1.5s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }

        .card-loader {
            width: 100%; 
            height: 100%; 
            background: rgba(240, 240, 240, 0.95); 
            border-radius: 12px; 
            border: 2px solid #fff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            animation: flipCard 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-loader::after {
            content: '🎲';
            font-size: 30px;
        }

        @keyframes flipCard { 
            0% { transform: perspective(400px) rotateY(0deg); } 
            100% { transform: perspective(400px) rotateY(360deg); } 
        }

        /* ====== شريط التحميل السينمائي (متظبط على 3.5 ثانية بالظبط) ====== */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(240, 240, 240, 0.1);
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #f0f0f0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(240, 240, 240, 0.8);
            /* السحر هنا: الشريط بيملا في 3.5 ثانية بالتزامن مع التحويل */
            animation: loadProgress 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 40%; }
            70% { width: 75%; }
            100% { width: 100%; }
        }
    </style>

    <script>
        const cardDatabase = {
            "1": "1qu6YdXldg_3yfhRNpBSDcNb812jX6zsb",
            "2": "1ptdc7mw3GQ8UIbaDqTX2jMXcQ3ljp3Y0",
            "3": "1ouCtCYgfwZp0ATaHQEFnEoRVXOlO2Jom",
            "4": "1byhfZzACpWPptafa4LYGS_Fb1HyAnhGp",
            "5": "1ITTt6_ZHNhmfXG09I_zYC4ftKOXjAFH-",
            "6": "1GwNJa4lkNRzefQOWKQcBWAPwAwH7igLP",
            "7": "130XaQhjnOfIuDCKE7n2MH3FtPv4M0oWj",
            "8": "12I12qhb_Q5giIJ8e9gRXRPWt-rwC1Hue",
            "9": "1vSY7ZS04idHakI0bvjbt72dai68XSssJ",
            "10": "1_fTvnOsMapXlwwFY3aDuK7Ob6nbZdOUG",
            "11": "1U_wWI6Brz2GcVkFYHEckpvwM006CcoN0",
            "12": "1IZt07iwzOs-BC98JuzzkGbJwm54qcwab",
            "13": "16FluRYUyamXevZVDjVPhcRmtd9cq88Uf",
            "14": "1GZTKXBogY0E_zHvagW3hDUmT67syCdqg",
            "15": "1yLvyisdqn7J2ljMxG9dT5OKhXXsTXu7j",
            "16": "1E6dzcfODGUn2-0tPZD7T9OMroeXUl4ez",
            "17": "13EazBzOqqnjFpOW6ql-ByGniFhKD7POY",
            "18": "1b7sv8YQZqPHYx9n7JCjzySxi50DJDn0B" 
        };

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId && cardDatabase[cardId]) {
                const driveId = cardDatabase[cardId];
                const directImgUrl = `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`;
                
                // تحويل بعد 3.5 ثانية (بالضبط مع نهاية شريط التحميل)
                setTimeout(() => {
                    window.location.replace(directImgUrl);
                }, 3500);

            } else {
                // لو الباركود غلط، هيخفي شريط التحميل ويجيب رسالة خطأ شيك
                document.getElementById('content-box').innerHTML = `
                    <div style="font-size: 50px; margin-bottom: 15px;">⚠️</div>
                    <h2>الكارت غير موجود</h2>
                    <div class="small-text" style="margin-top: 10px;">يرجى التأكد من مسح الـ QR الصحيح</div>
                `;
            }
        }
    </script>
</head>
<body>
    <div class="glass-box" id="content-box">
        <div class="card-wrapper">
            <div class="card-loader"></div>
        </div>
        <h2>جاري فتح الكارت</h2>
        <div class="small-text">قعدة سكرول</div>
        
        <!-- شريط التحميل السينمائي -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>
</body>
</html>
