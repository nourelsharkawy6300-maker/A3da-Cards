<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a4d9e">
    
    <meta name="referrer" content="no-referrer">
    
    <title>لعبة قعدة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNZPERH684"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RNZPERH684');
    </script>

    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { 
            margin: 0; 
            font-family: 'Tajawal', sans-serif; 
            background-color: #4a4d9e; 
            
            /* خلفية بتتحرك ببطء شديد وانسيابية */
            background-image: url('image_23f560.jpg');
            background-size: 150%; 
            background-position: center;
            background-attachment: fixed;
            animation: panBackground 30s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
            
            color: #f0f0f0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            text-align: center; 
            overflow: hidden; 
            position: relative;
            letter-spacing: normal; 
            
            user-select: none; 
            -webkit-user-select: none;
        }

        @keyframes panBackground {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 100%; }
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 77, 158, 0.45); z-index: 0;
        }

        /* البوكس الزجاجي الموسع */
        .glass-box {
            background: rgba(240, 240, 240, 0.08); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(240, 240, 240, 0.15); 
            border-radius: 24px; 
            padding: 20px 15px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); 
            width: 95%; 
            max-width: 420px; 
            box-sizing: border-box;
            z-index: 1;
            animation: popUpBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes popUpBounce { 
            0% { opacity: 0; transform: scale(0.8) translateY(40px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        .game-logo {
            max-width: 100px; margin: 0 auto 10px auto; display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        h2 { font-size: 24px; margin: 0 0 5px 0; font-weight: 900; color: #f0f0f0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .small-text { font-weight: 500; font-size: 14px; color: rgba(240, 240, 240, 0.7); margin-bottom: 5px; }

        /* ====== الكارت (ثبات تام + لمعة فخمة) ====== */
        .display-card {
            width: 100%; 
            max-height: 68vh; 
            object-fit: contain; 
            border-radius: 12px; 
            border: 2px solid rgba(240, 240, 240, 0.8); 
            margin: 5px auto 15px auto; 
            display: block; 
            pointer-events: none; 
            
            /* الأنيميشن: نبض ضوئي هادي ومريح للعين */
            animation: premiumGlow 4s ease-in-out infinite;
        }

        @keyframes premiumGlow {
            0% { box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 0px rgba(255,255,255,0); filter: brightness(1); }
            50% { box-shadow: 0 20px 45px rgba(0,0,0,0.8), 0 0 20px rgba(255,255,255,0.15); filter: brightness(1.08); }
            100% { box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 0px rgba(255,255,255,0); filter: brightness(1); }
        }

        /* لفة الـ 3D عند ظهور الكارت لأول مرة */
        .final-card-container { 
            display: none; 
            animation: cardReveal3D 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
            perspective: 1000px;
        }
        
        @keyframes cardReveal3D { 
            0% { opacity: 0; transform: rotateY(-90deg) scale(0.6) translateY(50px); } 
            100% { opacity: 1; transform: rotateY(0deg) scale(1) translateY(0); } 
        }
        /* ======================================================== */

        /* الزراير وتأثير النبض (Pulse) */
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 5px; width: 100%; }
        .action-btn { 
            font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 15px; 
            padding: 12px 5px; border-radius: 12px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); flex: 1; 
        }
        
        .btn-primary { 
            background: #f0f0f0; color: #4a4d9e; border: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: pulseBtn 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }
        
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(240, 240, 240, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(240, 240, 240, 0); }
            100% { box-shadow: 0 0 0 0 rgba(240, 240, 240, 0); }
        }

        .btn-secondary { background: rgba(240, 240, 240, 0.1); color: #f0f0f0; border: 2px solid #f0f0f0; }
        .action-btn:active { transform: scale(0.92); }

        /* شاشة التحميل وشريط التحميل الميتاليك */
        .card-wrapper { position: relative; width: 65px; height: 95px; margin: 0 auto 25px auto; }
        .card-wrapper::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; background: #f0f0f0; border-radius: 12px; filter: blur(18px);
            opacity: 0.5; animation: pulseGlow 1.5s infinite alternate ease-in-out; z-index: -1;
        }
        @keyframes pulseGlow { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; } }
        
        .card-loader {
            width: 100%; height: 100%; background: rgba(240, 240, 240, 0.95); border-radius: 12px; 
            border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; 
            justify-content: center; align-items: center; 
            animation: flipCard 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }
        .card-loader::after { content: '🎲'; font-size: 25px; }
        @keyframes flipCard { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }

        .progress-container { width: 100%; height: 6px; background: rgba(240, 240, 240, 0.1); border-radius: 10px; margin-top: 25px; overflow: hidden; position: relative; }
        .progress-bar { 
            height: 100%; width: 0%; border-radius: 10px; box-shadow: 0 0 10px rgba(240, 240, 240, 0.8); 
            animation: loadProgress 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
            background: linear-gradient(90deg, #f0f0f0 0%, #ffffff 50%, #f0f0f0 100%);
            background-size: 200% 100%;
        }
        @keyframes loadProgress { 0% { width: 0%; background-position: 100% 0; } 50% { background-position: 0 0; } 100% { width: 100%; background-position: -100% 0; } }

        /* ستايل كاميرا الاسكانر الداخلي */
        #scanner-state { display: none; animation: popUpBounce 0.5s forwards; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #fff; border: 2px solid #f0f0f0; margin-top: 15px; color: #000; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        #reader img { display: none; }
        #reader video { object-fit: cover !important; }
    </style>

    <script>
        // الحماية لمنع سرقة الكروت
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) { return false; }
        };

        // ====== 🚨 قاعدة البيانات المشفرة (تم إصلاح تكرار الكول سنتر بنجاح) 🚨 ======
        const secureDB = {
            "1": "MUlUVHQ2X1pITmhtZlhHMDlJX3pZQzRmdEtPWGpBRkgt", // موظف كول سينتر (تم الإصلاح والربط بالملف المستقل بالمللي)
            "2": "MXhEemZpRUJFeS1iVFFmbUZfci04azJRRnppQkxEZjNj", // كومنت تويتر
            "3": "MWY0OEp4VGJwalBrOWtRRVlCRjl5RHktdXJERnV1R19w", // بتاع نظرية المؤامرات
            "4": "MW1hV0ZvTmI0bEx1V1p4YTZfYko2WUJoUlB6LU92NE5J", // خدمه العملاء
            "5": "MUliU2k5NE9WY3VJMmY1SXJqV1lNSGxfcHVoZDd2YW4y", // لينكد ان
            "6": "MUZYRkRudTBXVzN1VGl6Q19rSDl3SnlyQi1qMU0xYWxt", // فوود بلوجر
            "7": "MWVYdVRBN2JDZ3ZnRHVBRTRURUh2TlN3bFM0T1V0WWs2", // المحنك اللي بيستفزك
            "8": "MU5SaURaOF9uOUVraXpZek1TTk1NN1dRdUkzU0dGSmF2", // الشخصية الصيوحة
            "9": "MXltVTVEYkl5alg0MlVpRzc5TabElyRmpkbC1vRlNtRlE=", // استرونج اندبندت وومن
            "10": "MVo2WHplS1UxOUxtRGlnX3QxTWpCZ0pyOGNvLXBCVFhP", // الشخصية المتنمره
            "11": "MUN3cWVYbW40WTYyYU02d3JnSlUyNlAwaEVqWnJ4cks5", // السرسجي
            "12": "MW1GdksxZzBTRXd2UlhqR2F2SThDUVVsbmNiZDNYUW5i", // مدرسين ثانوية عامة
            "13": "MWlQcWQzUnNLWl81OG5wZk5IamtOaE5weG9sb1I3MDdV", // امهات التيك توك
            "14": "MTJKb2pQM2x5Z2xETG81ZjBNZlE1RjZUUFRyWXR4NW9V", // شات جيبتي
            "15": "MW4yR3lSSDN5bFY5MFctcnJsdFZQRFZzVXVSSmE5SVJk", // شخصية اليوتيوب
            "16": "MUdFQlhaaTZCNUVNdWh0WUkxSkczVE1paXBXb3JkX0o2", // صفحة الاخبار العاجلة
            "17": "MUZJVDlEUU16VFNEWVkxYzgwX1Y1UjlUUTZyZ2pzcEZF", // بتاع الريتش
            "18": "MWY3T0NlT2xJakstVlA2elhTQjNOSkhvT3RqajNYb2gx"  // شاي بلبن
        };
        // ======================================================================

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId && secureDB[cardId]) {
                const driveId = atob(secureDB[cardId]);
                
                // الرابط المستقر لجوجل درايف (Thumbnail API)
                const directImgUrl = `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`;
                
                const imgPreloader = new Image();
                imgPreloader.src = directImgUrl;

                setTimeout(() => {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('game-card-img').src = directImgUrl;
                    document.getElementById('card-display-state').style.display = 'block';
                    
                    if(typeof gtag === 'function') { gtag('event', 'card_opened', { 'card_id': cardId }); }
                }, 3500);

            } else {
                showError();
            }
        }

        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('card-display-state').style.display = 'none';
            document.getElementById('content-box').innerHTML += `
                <div style="font-size: 50px; margin-bottom: 15px;">⚠️</div>
                <h2>الكارت غير موجود</h2>
            `;
        }

        let html5QrCode;
        function scanAgain() {
            document.getElementById('card-display-state').style.display = 'none';
            document.getElementById('scanner-state').style.display = 'block';
            
            if(typeof gtag === 'function') { gtag('event', 'scan_again_clicked'); }

            if(!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    onScanFailure
                ).catch(err => {
                    html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanFailure);
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            html5QrCode.stop().then(() => { window.location.replace(decodedText); })
            .catch(err => { window.location.replace(decodedText); });
        }

        function onScanFailure(error) { /* صامت */ }

        function closeCard() {
            if(typeof gtag === 'function') { gtag('event', 'card_closed'); }

            const contentBox = document.getElementById('content-box');
            contentBox.innerHTML = `
                <div style="animation: popUpBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;">
                    <div style="font-size: 65px; margin-bottom: 10px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));">🏁</div>
                    <h2 style="font-size: 30px; font-weight: 900; color: #f0f0f0; margin-bottom: 5px;">عاش يا بطل!</h2>
                    <div style="color: rgba(240, 240, 240, 0.8); font-size: 16px; font-weight: 500; margin-bottom: 25px; line-height: 1.6;">
                        دورك خلص في الكارت ده<br>تقدر تقفل الصفحة دلوقتي
                    </div>
                    <button class="action-btn btn-primary" onclick="scanAgain()" style="width: 80%; max-width: 200px; padding: 12px; margin: 0 auto; display: block;">سكان لكارت جديد</button>
                </div>
            `;
        }
    </script>
</head>
<body>
    <div class="glass-box" id="content-box">
        
        <img src="logo.png" alt="لوجو قعدة" class="game-logo" onerror="this.style.display='none'">

        <div id="loading-state">
            <div class="card-wrapper"><div class="card-loader"></div></div>
            <h2>جاري فتح الكارت</h2>
            <div class="progress-container"><div class="progress-bar"></div></div>
        </div>

        <div id="card-display-state" class="final-card-container">
            <h2>كارتك جاهز</h2>
            <img id="game-card-img" src="" alt="كارت قعدة" class="display-card">
            <div class="btn-group">
                <button class="action-btn btn-primary" onclick="scanAgain()">اسكان تاني</button>
                <button class="action-btn btn-secondary" onclick="closeCard()">خروج</button>
            </div>
        </div>

        <div id="scanner-state">
            <h2>وجه الكاميرا للكارت</h2>
            <div class="small-text">جاري تفعيل الكاميرا... وافق على الصلاحية</div>
            <div id="reader"></div>
        </div>

    </div>
</body>
</html>
