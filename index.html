<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    
    <meta property="og:title" content="لعبة قعدة 🎲">
    <meta property="og:description" content="اسحب كارتك وشوف حظك يا معلم!">
    
    <title>لعبة قعدة - جاري سحب الكارت...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNZPERH684"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RNZPERH684');
    </script>

    <style>
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; 
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
            color: #ffffff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; text-align: center; overflow: hidden; position: relative;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
            background-image: radial-gradient(rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 40px 40px; animation: particleMove 15s linear infinite;
        }
        @keyframes particleMove { 0% { transform: translateY(0); } 100% { transform: translateY(-40px); } }

        .glass-box {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); width: 85%; max-width: 400px; z-index: 1;
            opacity: 0; transform: scale(0.8) translateY(30px); animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp { to { opacity: 1; transform: scale(1) translateY(0); } }

        h2 { font-size: 26px; margin-bottom: 5px; font-weight: 900; color: #f1c40f; text-shadow: 0 3px 6px rgba(0,0,0,0.6); }
        .funny-quote { color: #00ffcc; font-size: 16px; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5); min-height: 25px; }
        
        .card-loader-container { perspective: 800px; margin: 0 auto 25px auto; width: 70px; height: 100px; }
        .card-loader {
            width: 100%; height: 100%; background: linear-gradient(135deg, #f1c40f, #e67e22);
            border-radius: 10px; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.5);
            animation: flipCard3D 1.5s infinite ease-in-out; transform-style: preserve-3d;
        }
        @keyframes flipCard3D {
            0% { transform: rotateY(0deg) translateY(0); }
            50% { transform: rotateY(180deg) translateY(-15px); box-shadow: 0 20px 30px rgba(241, 196, 15, 0.3); }
            100% { transform: rotateY(360deg) translateY(0); }
        }

        /* 🌟 ستايل الصورة وهي مالية الشاشة بالكامل */
        .full-screen-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* عشان الصورة تظهر كاملة وماتتقصش */
            background-color: #000000; /* خلفية سودة زي الاستوديو */
            z-index: 9999;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>

    <script>
        // 🚨 لينكات كروت جوجل درايف 🚨
        const cardLinks = {
            "1": "https://drive.google.com/file/d/1qu6YdXldg_3yfhRNpBSDcNb812jX6zsb/view?usp=drive_link",
            "2": "https://drive.google.com/file/d/1ptdc7mw3GQ8UIbaDqTX2jMXcQ3ljp3Y0/view?usp=drive_link",
            "3": "https://drive.google.com/file/d/1ouCtCYgfwZp0ATaHQEFnEoRVXOlO2Jom/view?usp=drive_link",
            "4": "https://drive.google.com/file/d/1byhfZzACpWPptafa4LYGS_Fb1HyAnhGp/view?usp=drive_link",
            "5": "https://drive.google.com/file/d/1ITTt6_ZHNhmfXG09I_zYC4ftKOXjAFH-/view?usp=drive_link",
            "6": "https://drive.google.com/file/d/1GwNJa4lkNRzefQOWKQcBWAPwAwH7igLP/view?usp=drive_link",
            "7": "https://drive.google.com/file/d/130XaQhjnOfIuDCKE7n2MH3FtPv4M0oWj/view?usp=drive_link",
            "8": "https://drive.google.com/file/d/12I12qhb_Q5giIJ8e9gRXRPWt-rwC1Hue/view?usp=drive_link",
            "9": "https://drive.google.com/file/d/1vSY7ZS04idHakI0bvjbt72dai68XSssJ/view?usp=drive_link",
            "10": "https://drive.google.com/file/d/1_fTvnOsMapXlwwFY3aDuK7Ob6nbZdOUG/view?usp=drive_link",
            "11": "https://drive.google.com/file/d/1U_wWI6Brz2GcVkFYHEckpvwM006CcoN0/view?usp=sharing",
            "12": "https://drive.google.com/file/d/1IZt07iwzOs-BC98JuzzkGbJwm54qcwab/view?usp=drive_link",
            "13": "https://drive.google.com/file/d/16FluRYUyamXevZVDjVPhcRmtd9cq88Uf/view?usp=drive_link",
            "14": "https://drive.google.com/file/d/1GZTKXBogY0E_zHvagW3hDUmT67syCdqg/view?usp=drive_link",
            "15": "https://drive.google.com/file/d/1yLvyisdqn7J2ljMxG9dT5OKhXXsTXu7j/view?usp=drive_link",
            "16": "https://drive.google.com/file/d/1E6dzcfODGUn2-0tPZD7T9OMroeXUl4ez/view?usp=drive_link",
            "17": "https://drive.google.com/file/d/13EazBzOqqnjFpOW6ql-ByGniFhKD7POY/view?usp=drive_link",
            "18": "حط_لينك_الكارت_رقم_18_هنا"
        };

        const funnyQuotes = [
            "يا ترى هتطلع أم خالد ولا إياد الموجي؟ 👀",
            "استرها علينا يارب من كارت الدبيس... 💸",
            "جهز نفسك لتقليد الدكتور! 👨‍🏫",
            "يا ساتر.. شكلها فيها كارت قفلنا المايك 🤐",
            "اسحب كارتك وواجه مصيرك يا معلم! ⚡",
            "يا ترى الكارت ده أكشن ولا فخ؟ 🃏"
        ];

        function getDriveId(url) {
            const match = url.match(/\/d\/(.+?)\//);
            return match ? match[1] : null;
        }

        window.onload = function() {
            const randomQuote = funnyQuotes[Math.floor(Math.random() * funnyQuotes.length)];
            const quoteElement = document.getElementById('random-quote');
            if (quoteElement) quoteElement.innerText = randomQuote;

            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId && cardLinks[cardId]) {
                const driveId = getDriveId(cardLinks[cardId]);
                
                // لو قدرنا نجيب الـ ID بتاع الصورة
                if (driveId) {
                    const imgUrl = `https://drive.google.com/uc?export=view&id=${driveId}`;
                    
                    // استنى ثانيتين، وبعدين امسح الشاشة واعرض الصورة Full Screen
                    setTimeout(() => {
                        document.body.innerHTML = `<img src="${imgUrl}" class="full-screen-img" alt="الكارت" />`;
                    }, 2000);

                } else {
                    // لو اللينك محطوط غلط هيحوله عادي
                    setTimeout(() => { window.location.replace(cardLinks[cardId]); }, 2000);
                }

            } else {
                document.getElementById('content-box').innerHTML = `
                    <div style="font-size: 60px; margin-bottom: 15px; animation: shake 0.5s;">⚠️</div>
                    <h2>الكارت ده مش موجود!</h2>
                    <p style="color: #e0e0e0; font-size: 15px;">شكلك ضربت باركود غلط يا معلم.</p>
                `;
            }
        }
    </script>
</head>
<body>
    <div class="particles"></div>
    <div class="glass-box" id="content-box">
        <div class="card-loader-container">
            <div class="card-loader"></div>
        </div>
        <h2>🚀 ثواني وكارتك يفتح...</h2>
        <div id="random-quote" class="funny-quote">جاري سحب الكارت...</div>
    </div>
</body>
</html>
