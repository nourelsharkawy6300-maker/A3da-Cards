<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة قعدة</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card-img { width: 100%; max-width: 500px; }
    </style>
</head>
<body>
    <img id="cardImage" src="" class="card-img" />
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cardId = urlParams.get('id');
        // هنا الكود بياخد رقم الكارت وبيفتح الصورة اللي اسمها (رقم.jpg) من نفس مكان الموقع
        if(cardId) {
            document.getElementById('cardImage').src = cardId + ".jpg";
        }
    </script>
</body>
</html>
